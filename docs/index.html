<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Website title</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="styles/styles.css" />
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/5980/5980620.png" />
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('nav-placeholder').innerHTML = html;
      document.getElementById('rightCol').innerHTML = `
        <p><span class="OpeningLine">What is this?</span></p>
        <p>Body text blah blah.</p>
        <p>Body text blah blah.</p>
      `;
      document.getElementById('rightSidebar').innerHTML = `
        <div class="SidebarItemHeading">Projects</div>
        <div class="SidebarItem">Project one — short description here</div>
        <div class="SidebarItem">Project two — short description here</div>
        <div class="SidebarItem">Project three — short description here</div>
        <div class="SidebarItemHeading" style="margin-top:16px;">Links</div>
        <div class="SidebarItem">GitHub</div>
        <div class="SidebarItem">LinkedIn</div>
      `;
    });

  fetch('/includes/footer.html')
    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html);
</script>

</body>
</html>
