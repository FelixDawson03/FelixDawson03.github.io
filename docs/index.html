<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Home — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
  <script src="/scripts/utils.js"></script>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
  .then(r => r.text())
  .then(html => {
    injectHTML(document.getElementById('nav-placeholder'), html);
    document.getElementById('rightCol').innerHTML = `
      <p><span class="PageHeading">Home</span></p>
      <hr class="PageDivider">
      <p>Welcome to my personal website! I'm just getting started, so things are a little empty right now... Click the "About" section to find out more about me and what this website is for. Hopefully I'll be adding more very soon!</p>
      <p>Best wishes,<br>Felix :)</p>
    `;
    return fetch('/includes/rightSidebar.html');
  })
  .then(r => r.text())
  .then(html => {
    document.getElementById('rightSidebar').innerHTML = html;
  });

fetch('/includes/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
