<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Theatre — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
  <script src="/scripts/utils.js"></script>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
  .then(r => r.text())
  .then(html => {
    injectHTML(document.getElementById('nav-placeholder'), html);
    document.getElementById('rightCol').innerHTML = `
      <p><span class="PageHeading">Theatre</span></p>
      <hr class="PageDivider">
      <p>Other than a few experiences in high school, I lack any formal training in the theatre. Regardless, I have enjoyed the theatre from a young age and now spend much of my free time reading—and reading about—drama. I also enjoy attending local productions, which (time permitting) I hope to review here—both to raise awareness for smaller productions and to practice my writing. Eventually I'll publish some short plays I've been working on, on here too. My first review of a local production will be published this Friday.</p>
    `;
    return fetch('/includes/rightSidebar.html');
  })
  .then(r => r.text())
  .then(html => {
    document.getElementById('rightSidebar').innerHTML = html;
  });

fetch('/includes/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
