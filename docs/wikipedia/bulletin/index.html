<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Wikipedia Bulletin — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
  <script src="/scripts/utils.js"></script>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
    .then(r => r.text())
    .then(html => {
      injectHTML(document.getElementById('nav-placeholder'), html);
      return fetch('/includes/bulletin.json');
    })
    .then(r => r.json())
    .then(entries => {
      const html = entries.map(e =>
        `<div style="padding-left:5em;text-indent:-5em;"><strong>${e.date}</strong> ${e.text} <a href="${e.url}">${e.article}</a></div>`
      ).join('');
      document.getElementById('rightCol').innerHTML = `
        <div class="PageCornerLinkLeft"><a href="/wikipedia/">← Wikipedia</a></div>
        <p><span class="PageHeading">Wikipedia Bulletin</span></p>
        <hr class="PageDivider">
        ${html}
      `;
      return fetch('/includes/rightSidebar.html');
    })
    .then(r => r.text())
    .then(html => {
      document.getElementById('rightSidebar').innerHTML = html;
    });

fetch('/includes/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
