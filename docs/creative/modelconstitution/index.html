<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Model Constitution — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('nav-placeholder').innerHTML = html;
    document.getElementById('rightCol').innerHTML = `
      <div class="PageCornerLinkLeft"><a href="/creative/">← Creative Works</a></div>
      <p><span class="PageHeading">Model Constitution</span></p>
      <hr class="PageDivider">
      <p><b>PREAMBLE</b></p>
      <p>We, the people of the commonwealth of Kentucky, recognizing the rights and duties of this commonwealth as a part of the federal system of government, reaffirm our adherence to the Constitution of the United States of America; and in order to assure the state government power to act for the good order of the commonwealth and the liberty, health, safety and welfare of the people, we do ordain and establish this constitution.</p>
      <p><b>ARTICLE I</b></p>
      <p><b>Bill of Rights</b></p>
      <p>Section 1.01. <i>Freedom of Religion, Speech, Press, Assembly and Petition.</i> No law shall be enacted respecting an establishment of religion, or prohibiting the free exercise thereof, or abridging the freedom of speech or of the press, or the right of the people peaceably to assemble and to petition the government for a redress of grievances.</p>
      <p>Section 1.02. <i>Due Process and Equal Protection.</i> No person shall be deprived of life, liberty or property without due process of law, nor be denied the equal protection of the laws, nor be denied the enjoyment of his civil rights or be discriminated against in the exercise thereof because of race, national origin, religion or ancestry.</p>
      <p>Section 1.03. <i>Searches and Seizures and Interceptions.</i></p>
    `;
    return fetch('/includes/rightSidebar.html');
  })
  .then(r => r.text())
  .then(html => {
    document.getElementById('rightSidebar').innerHTML = html;
  });

fetch('/includes/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
