    document.getElementById('rightCol').innerHTML = `
      <div class="PageCornerLinkLeft"><a href="/creative/">← Creative Works</a></div>
      <p><span class="PageHeading">Model Constitution</span></p>
      <hr class="PageDivider">

      <div class="JustifiedText">
      <p><b>PREAMBLE</b></p>
      <p>We, the people of the commonwealth of Kentucky, recognizing the rights and duties of this commonwealth as a part of the federal system of government, reaffirm our adherence to the Constitution of the United States of America; and in order to assure the state government power to act for the good order of the commonwealth and the liberty, health, safety and welfare of the people, we do ordain and establish this constitution.</p>
      
      <p><b>ARTICLE I</b></p>
      <p><b>Bill of Rights</b></p>
      <p>Section 1.01. <i>Freedom of Religion, Speech, Press, Assembly and Petition.</i> No law shall be enacted respecting an establishment of religion, or prohibiting the free exercise thereof, or abridging the freedom of speech or of the press, or the right of the people peaceably to assemble and to petition the government for a redress of grievances.</p>
      <p>Section 1.02. <i>Due Process and Equal Protection.</i> No person shall be deprived of life, liberty or property without due process of law, nor be denied the equal protection of the laws, nor be denied the enjoyment of their civil rights or be discriminated against in the exercise thereof because of race, national origin, religion or ancestry.</p>
      <p>Section 1.03. <i>Searches and Seizures and Interceptions.</i><br>
      (a) The right of the people to be secure in their persons, houses, papers and effects against unreasonable searches and seizures shall not be violated, and no warrants shall issue, but upon probable cause, supported by oath or affirmation, and particularly describing the place to be searched and the persons or things to be seized.<br>
      (b) The right of the people to be secure against unreasonable interception of telephone, telegraph and other electronic means of communication, and against unreasonable interception of oral and other communications by electric or electronic methods, shall not be violated, and no orders and warrants for such interceptions shall issue but upon probable cause supported by oath or affirmation that evidence of crime may be thus obtained, and particularly identifying the means of communication and the person or persons whose communications are to be intercepted.<br>
      (c) Evidence obtained in violation of this section shall not be admissible in any court against any person.</p>
      <p>Section 1.04. <i>Self-Incrimination.</i> No person shall be compelled to give testimony which might tend to incriminate them.</p>
      <p>Section 1.05. <i>Writ of Habeas Corpus.</i> The privilege of the writ of habeas corpus shall not be suspended unless when in cases of rebellion or invasion the public safety may require it.</p>
      <p>Section 1.06. <i>Rights of Accused Persons.</i><br>
      (a) In all criminal prosecutions the accused shall enjoy the right to a speedy and public trial, to be informed of the nature and cause of the accusation, to be confronted with the witnesses against them, to have compulsory process for obtaining witnesses in their favor, to have the assistance of counsel for their defense, and to the assignment of counsel to represent them at every stage of the proceedings unless they elect to proceed without counsel or is able to obtain counsel. In prosecutions for felony, the accused shall also enjoy the right of trial by an impartial jury of the county wherein the crime shall have been committed, or of another county, if a change of venue has been granted.<br>
      (b) All persons shall, before conviction, be bailable by sufficient sureties, but bail may be denied to persons charged with capital offenses or offenses punishable by life imprisonment, giving due weight to the evidence and to the nature and circumstances of the event. Excessive bail shall not be required, nor excessive fines imposed, nor cruel or unusual punishment inflicted.<br>
      (c) No person shall be twice put in jeopardy for the same offense.</p>
      <p>Section 1.07. <i>Political Tests for Public Office.</i> No oath, declaration or political test shall be required for any public office or employment other than the following oath or affirmation: "I do solemnly swear [or affirm] that I will support and defend the Constitution of the United States and the constitution of the commonwealth of Kentucky and that I will faithfully discharge the duties of the office of __________ to the best of my ability."</p>

      <p><b>ARTICLE II</b></p>
      <p><b>Powers of the Commonwealth</b></p>
      <p>Section 2.01. <i>Powers of Government.</i> The enumeration in this constitution of specified powers and functions shall be construed neither as a grant nor as a limitation of the powers of state government but the state government shall have all of the powers not denied by this constitution or by or under the Constitution of the United States.</p>

      <p><b>ARTICLE III</b></p>
      <p><b>Suffrage and Elections</b></p>
      <p>Section 3.01. <i>Qualifications for Voting.</i> Every citizen of the age of seventeen years who is a resident of the commonwealth shall have the right to vote in the election of all officers that may be elected by the people and upon all questions that may be submitted to the voters; but the legislature may by law establish disqualifications for voting for mental incompetency or conviction of felony. Provided, that such disqualification for conviction of felony shall exist only during the term of service.</p>
      <p>Section 3.02. <i>Legislature to Prescribe for Exercise of Suffrage.</i> The legislature shall by law define residence for voting purposes, ensure secrecy in voting and provide for the registration of voters, absentee voting, the administration of elections and the nomination of candidates.</p>

      <p><b>ARTICLE IV</b></p>
      <p><b>The Legislature</b></p>
      <p>Section 4.01. <i>Legislative Power.</i> The legislative power of the commonwealth shall be vested in the legislature.</p>
      <p>Section 4.02. <i>Composition of the Legislature.</i> The legislature shall be composed of a single chamber consisting of one member to represent each legislative district. The number of members shall be prescribed by law but shall not be less than one hundred nor exceed two hundred. Each member of the legislature shall be a qualified voter of the commonwealth and shall be at least twenty-one years of age.</p>
      <p>Section 4.03. <i>Election and Term of Members.</i> The members of the legislature shall be elected by the qualified voters of the commonwealth for a term of four years.</p>
      <p>Section 4.04. <i>Legislative Districts.</i> Placeholder text.</p>
      <p>Section 4.05. <i>Time of Election.</i> Members of the legislature shall be elected at the regular election in each midterm election year.</p>
      <p>Section 4.06. <i>Vacancies.</i> When a vacancy occurs in the legislature it shall be filled as provided by law.</p>
      <p>Section 4.07. <i>Compensation of Members.</i> The members of the legislature shall receive an annual salary and such allowances as may be prescribed by law but any increase or decrease in the amount thereof shall not apply to the legislature which enacted the same.</p>
      <p>Section 4.08. <i>Sessions.</i> The legislature shall be a continuous body during the term for which its members are elected. It shall meet in regular sessions annually as provided by law. It may be convened at other times by the governor or, at the written request of a majority of the members, by the presiding officer of the legislature.</p>
      <p>Section 4.09. <i>Organization and Procedure.</i> The legislature shall be the final judge of the election and qualifications of its members and may by law vest in the courts the trial and determination of contested elections of members. It shall choose its presiding officer from among its members and it shall employ a secretary to serve for an indefinite term. It shall determine its rules of procedure; it may compel the attendance of absent members, discipline its members and, with the concurrence of two thirds of all the members, expel a member, and it shall have power to compel the attendance and testimony of witnesses and the production of books and papers either before the legislature as a whole or before any committee thereof. The secretary of the legislature shall be its chief fiscal, administrative and personnel officer and shall perform such duties as the legislature may prescribe.</p>
      <p>Section 4.10. <i>Legislative Immunity.</i> For any speech or debate in the legislature, the members shall not be questioned in any other place.</p>
      <p>Section 4.11. <i>Special Legislation.</i> The legislature shall pass no special or local act when a general act is or can be made applicable, and whether a general act is or can be made applicable shall be a matter for judicial determination.</p>
      <p>Section 4.12. <i>Transaction of Business.</i> A majority of all the members of the legislature shall constitute a quorum to do business but a smaller number may adjourn from day to day and compel the attendance of absent members. The legislature shall keep a journal of its proceedings which shall be published from day to day. The legislature shall prescribe the methods of voting on legislative matters but a record vote, with the yeas and nays entered in the journal, shall be taken on any question on the demand of one fifth of the members present.</p>
      <p>Section 4.13. <i>Committees.</i> The legislature may establish such committees as it may deem necessary for the conduct of its business. When a committee to which a bill has been assigned has not reported on it, one third of all the members of the legislature shall have power to relieve it of further consideration. Adequate public notice of all committee hearings, with a clear statement of all subjects to be considered at each hearing, shall be published in advance.</p>
      <p>Section 4.14. <i>Bills; Single Subject.</i> The legislature shall enact no law except by bill and every bill except bills for appropriations and bills for the codification, revision or rearrangement of existing laws shall be confined to one subject. All appropriation bills shall be limited to the subject of appropriations. Legislative compliance with the requirements of this section is a constitutional responsibility not subject to judicial review.</p>
      <p>Section 4.15. <i>Passage of Bills.</i> No bill shall become a law unless it has been printed and upon the desks of the members in final form at least three days prior to final passage and the majority of all the members has assented to it. The yeas and nays on final passage shall be entered in the journal. The legislature shall provide for the publication of all acts and no act shall become effective until published as provided by law.</p>
      <p>Section 4.16. <i>Action by the Governor.</i><br>
      (a) When a bill has passed the legislature, it shall be presented to the governor and, if the legislature is in session, it shall become law if the governor either signs or fails to veto it within fifteen days of presentation. If the legislature is in recess or, if the session of the legislature has expired during such fifteen day period, it shall become law if they sign it within thirty days after such adjournment or expiration. If the governor does not approve a bill, they shall veto it and return it to the legislature either within fifteen days of presentation if the legislature is in session or upon the reconvening of the legislature from its recess. Any bill so returned by the governor shall be reconsidered by the legislature and, if upon reconsideration two thirds of all the members shall agree to pass the bill, it shall become law.<br>
      (b) The governor may strike out or reduce items in appropriation bills passed by the legislature and the procedure in such cases shall be the same as in case of the disapproval of an entire bill by the governor.</p>
      <p>Section 4.17. <i>Post Audit.</i> The legislature shall appoint an auditor to serve at its pleasure. The auditor shall conduct post audits as prescribed by law and shall report to the legislature and to the governor.</p>
      <p>Section 4.18. <i>Impeachment.</i> The legislature may impeach the governor, the heads of principal departments, judicial officers and such other officers of the commonwealth as may be made subject to impeachment by law, by a two thirds vote of all the members, and shall provide by law procedures for the trial and removal from office, after conviction, of officers so impeached. No officer shall be convicted on impeachment by a vote of less than two thirds of the members of the tribunal hearing the charges.</p>
      
      </div>
