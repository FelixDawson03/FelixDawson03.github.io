      <div class="PageCornerLinkLeft"><a href="/creative/">← Creative Works</a></div>
      <p><span class="PageHeading">Model Constitution</span></p>
      <hr class="PageDivider">

      <div class="JustifiedText">
      <p><b>PREAMBLE</b></p>
      <p>We, the people of the commonwealth of Kentucky, recognizing the rights and duties of this commonwealth as a part of the federal system of government, reaffirm our adherence to the Constitution of the United States of America; and in order to assure the state government power to act for the good order of the commonwealth and the liberty, health, safety and welfare of the people, we do ordain and establish this constitution.</p>
      
      <p><b>ARTICLE I</b></p>
      <p><b>Bill of Rights</b></p>
      <p>Section 1.01. <i>Freedom of Religion, Speech, Press, Assembly and Petition.</i> No law shall be enacted respecting an establishment of religion, or prohibiting the free exercise thereof, or abridging the freedom of speech or of the press, or the right of the people peaceably to assemble and to petition the government for a redress of grievances.</p>
      <p>Section 1.02. <i>Due Process and Equal Protection.</i> No person shall be deprived of life, liberty or property without due process of law, nor be denied the equal protection of the laws, nor be denied the enjoyment of their civil rights or be discriminated against in the exercise thereof because of race, national origin, religion or ancestry.</p>
      <p>Section 1.03. <i>Searches and Seizures and Interceptions.</i><br>
      (a) The right of the people to be secure in their persons, houses, papers and effects against unreasonable searches and seizures shall not be violated, and no warrants shall issue, but upon probable cause, supported by oath or affirmation, and particularly describing the place to be searched and the persons or things to be seized.<br>
      (b) The right of the people to be secure against unreasonable interception of telephone, telegraph and other electronic means of communication, and against unreasonable interception of oral and other communications by electric or electronic methods, shall not be violated, and no orders and warrants for such interceptions shall issue but upon probable cause supported by oath or affirmation that evidence of crime may be thus obtained, and particularly identifying the means of communication and the person or persons whose communications are to be intercepted.<br>
      (c) Evidence obtained in violation of this section shall not be admissible in any court against any person.</p>
      <p>Section 1.04. <i>Self-Incrimination.</i> No person shall be compelled to give testimony which might tend to incriminate them.</p>
      <p>Section 1.05. <i>Writ of Habeas Corpus.</i> The privilege of the writ of habeas corpus shall not be suspended unless when in cases of rebellion or invasion the public safety may require it.</p>
      <p>Section 1.06. <i>Rights of Accused Persons.</i><br>
      (a) In all criminal prosecutions the accused shall enjoy the right to a speedy and public trial, to be informed of the nature and cause of the accusation, to be confronted with the witnesses against them, to have compulsory process for obtaining witnesses in their favor, to have the assistance of counsel for their defense, and to the assignment of counsel to represent them at every stage of the proceedings unless they elect to proceed without counsel or is able to obtain counsel. In prosecutions for felony, the accused shall also enjoy the right of trial by an impartial jury of the county wherein the crime shall have been committed, or of another county, if a change of venue has been granted.<br>
      (b) All persons shall, before conviction, be bailable by sufficient sureties, but bail may be denied to persons charged with capital offenses or offenses punishable by life imprisonment, giving due weight to the evidence and to the nature and circumstances of the event. Excessive bail shall not be required, nor excessive fines imposed, nor cruel or unusual punishment inflicted.<br>
      (c) No person shall be twice put in jeopardy for the same offense.</p>
      <p>Section 1.07. <i>Political Tests for Public Office.</i> No oath, declaration or political test shall be required for any public office or employment other than the following oath or affirmation: "I do solemnly swear [or affirm] that I will support and defend the Constitution of the United States and the constitution of the commonwealth of Kentucky and that I will faithfully discharge the duties of the office of __________ to the best of my ability."</p>

      <p><b>ARTICLE II</b></p>
      <p><b>Powers of the Commonwealth</b></p>
      <p>Section 2.01. <i>Powers of Government.</i> The enumeration in this constitution of specified powers and functions shall be construed neither as a grant nor as a limitation of the powers of state government but the state government shall have all of the powers not denied by this constitution or by or under the Constitution of the United States.</p>

      <p><b>ARTICLE III</b></p>
      <p><b>Suffrage and Elections</b></p>
      <p>Section 3.01. <i>Qualifications for Voting.</i> Every citizen of the age of seventeen years who is a resident of the commonwealth shall have the right to vote in the election of all officers that may be elected by the people and upon all questions that may be submitted to the voters; but the legislature may by law establish disqualifications for voting for mental incompetency or conviction of felony. Provided, that such disqualification for conviction of felony shall exist only during the term of service.</p>
      <p>Section 3.02. <i>Legislature to Prescribe for Exercise of Suffrage.</i> The legislature shall by law define residence for voting purposes, ensure secrecy in voting and provide for the registration of voters, absentee voting, the administration of elections and the nomination of candidates.</p>

      <p><b>ARTICLE IV</b></p>
      <p><b>The Legislature</b></p>
      <p>Section 4.01. <i>Legislative Power.</i> The legislative power of the commonwealth shall be vested in the legislature.</p>
      <p>Section 4.02. <i>Composition of the Legislature.</i> The legislature shall be composed of a single chamber consisting of one member to represent each legislative district. The number of members shall be prescribed by law but shall not be less than one hundred nor exceed two hundred. Each member of the legislature shall be a qualified voter of the commonwealth and shall be at least twenty-one years of age.</p>
      <p>Section 4.03. <i>Election and Term of Members.</i> The members of the legislature shall be elected by the qualified voters of the commonwealth for a term of four years beginning on the first day of January next following their election.</p>
      <p>Section 4.04. <i>Legislative Districts.</i> Placeholder text.</p>
      <p>Section 4.05. <i>Time of Election.</i> Members of the legislature shall be elected at the regular election in each midterm election year.</p>
      <p>Section 4.06. <i>Vacancies.</i> When a vacancy occurs in the legislature it shall be filled as provided by law.</p>
      <p>Section 4.07. <i>Compensation of Members.</i> The members of the legislature shall receive an annual salary and such allowances as may be prescribed by law but any increase or decrease in the amount thereof shall not apply to the legislature which enacted the same.</p>
      <p>Section 4.08. <i>Sessions.</i> The legislature shall be a continuous body during the term for which its members are elected. It shall meet in regular sessions annually as provided by law. It may be convened at other times by the governor or, at the written request of a majority of the members, by the presiding officer of the legislature.</p>
      <p>Section 4.09. <i>Organization and Procedure.</i> The legislature shall be the final judge of the election and qualifications of its members and may by law vest in the courts the trial and determination of contested elections of members. It shall choose its presiding officer from among its members and it shall employ a secretary to serve for an indefinite term. It shall determine its rules of procedure; it may compel the attendance of absent members, discipline its members and, with the concurrence of two thirds of all the members, expel a member, and it shall have power to compel the attendance and testimony of witnesses and the production of books and papers either before the legislature as a whole or before any committee thereof. The secretary of the legislature shall be its chief fiscal, administrative and personnel officer and shall perform such duties as the legislature may prescribe.</p>
      <p>Section 4.10. <i>Legislative Immunity.</i> For any speech or debate in the legislature, the members shall not be questioned in any other place.</p>
      <p>Section 4.11. <i>Special Legislation.</i> The legislature shall pass no special or local act when a general act is or can be made applicable, and whether a general act is or can be made applicable shall be a matter for judicial determination.</p>
      <p>Section 4.12. <i>Transaction of Business.</i> A majority of all the members of the legislature shall constitute a quorum to do business but a smaller number may adjourn from day to day and compel the attendance of absent members. The legislature shall keep a journal of its proceedings which shall be published from day to day. The legislature shall prescribe the methods of voting on legislative matters but a record vote, with the yeas and nays entered in the journal, shall be taken on any question on the demand of one fifth of the members present.</p>
      <p>Section 4.13. <i>Committees.</i> The legislature may establish such committees as it may deem necessary for the conduct of its business. When a committee to which a bill has been assigned has not reported on it, one third of all the members of the legislature shall have power to relieve it of further consideration. Adequate public notice of all committee hearings, with a clear statement of all subjects to be considered at each hearing, shall be published in advance.</p>
      <p>Section 4.14. <i>Bills; Single Subject.</i> The legislature shall enact no law except by bill and every bill except bills for appropriations and bills for the codification, revision or rearrangement of existing laws shall be confined to one subject. All appropriation bills shall be limited to the subject of appropriations. Legislative compliance with the requirements of this section is a constitutional responsibility not subject to judicial review.</p>
      <p>Section 4.15. <i>Passage of Bills.</i> No bill shall become a law unless it has been printed and upon the desks of the members in final form at least three days prior to final passage and the majority of all the members has assented to it. The yeas and nays on final passage shall be entered in the journal. The legislature shall provide for the publication of all acts and no act shall become effective until published as provided by law.</p>
      <p>Section 4.16. <i>Action by the Governor.</i><br>
      (a) When a bill has passed the legislature, it shall be presented to the governor and, if the legislature is in session, it shall become law if the governor either signs or fails to veto it within fifteen days of presentation. If the legislature is in recess or, if the session of the legislature has expired during such fifteen day period, it shall become law if they sign it within thirty days after such adjournment or expiration. If the governor does not approve a bill, they shall veto it and return it to the legislature either within fifteen days of presentation if the legislature is in session or upon the reconvening of the legislature from its recess. Any bill so returned by the governor shall be reconsidered by the legislature and, if upon reconsideration two thirds of all the members shall agree to pass the bill, it shall become law.<br>
      (b) The governor may strike out or reduce items in appropriation bills passed by the legislature and the procedure in such cases shall be the same as in case of the disapproval of an entire bill by the governor.</p>
      <p>Section 4.17. <i>Post Audit.</i> The legislature shall appoint an auditor to serve at its pleasure. The auditor shall conduct post audits as prescribed by law and shall report to the legislature and to the governor.</p>
      <p>Section 4.18. <i>Impeachment.</i> The legislature may impeach the governor, the heads of principal departments, judicial officers and such other officers of the commonwealth as may be made subject to impeachment by law, by a two thirds vote of all the members, and shall provide by law procedures for the trial and removal from office, after conviction, of officers so impeached. No officer shall be convicted on impeachment by a vote of less than two thirds of the members of the tribunal hearing the charges.</p>

      <p><b>ARTICLE V</b></p>
      <p><b>The Executive</b></p>
      <p>Section 5.01. <i>Executive Power.</i> The executive power of the commonwealth shall be vested in a governor.</p>
      <p>Section 5.02. <i>Election and Qualifications of Governor.</i> The governor shall be elected, at the regular election every other even numbered year, by the direct vote of the people, for a term of four years beginning on the first day of January next following their election. Any qualified voter of the commonwealth who is at least twenty-one years of age shall be eligible to the office of governor.</p>
      <p>Section 5.03. <i>Governor's Messages to the Legislature.</i> The governor shall, at the beginning of each session, and may, at other times, give to the legislature information as to the affairs of the commonwealth and recommend measures they consider necessary or desirable.</p>
      <p>Section 5.04. <i>Executive and Administrative Powers.</i><br>
      (a) The governor shall be responsible for the faithful execution of the laws. They may, by appropriate action or proceeding brought in the name of the commonwealth, enforce compliance with any constitutional or legislative mandate, or restrain violation of any constitutional or legislative power, duty or right by an officer, department or agency of the commonwealth or any of its civil divisions. This authority shall not authorize any action or proceeding against the legislature.<br>
      (b) The governor shall commission all officers of the commonwealth. They may at any time require information, in writing or otherwise, from the officers of any administrative department, office or agency upon any subject relating to the respective offices. They shall be commander in chief of the armed forces of the commonwealth, except when said forces shall be called into the service of the United States, and may call them out to execute the laws, to preserve order, to suppress insurrection or to repel invasion.</p>
      <p>Section 5.05. <i>Executive Clemency.</i> The governor shall have power to grant reprieves, commutations and pardons, after conviction, for all offenses and may delegate such powers, subject to such procedures as may be prescribed by law.</p>
      <p>Section 5.06. <i>Administrative Departments.</i> All executive and administrative offices, agencies and instrumentalities of the government of the commonwealth, and their respective functions, powers and duties, shall be allocated by law among and within not more than twenty principal departments so as to group them as far as practicable according to major purposes. Regulatory, quasi-judicial and temporary agencies established by law may, but need not, be allocated within a principal department. The legislature shall by law prescribe the functions, powers and duties of the principal departments and of all other agencies of the commonwealth and may from time to time reallocate offices, agencies and instrumentalities among the principal departments, may increase, modify, diminish or change their functions, powers and duties and may assign new functions, powers and duties to them; but the governor may make such changes in the allocation of offices, agencies and instrumentalities, and in the allocation of such functions, powers and duties, as they consider necessary for efficient administration. If such changes affect existing law, they shall be set forth in executive orders, which shall be submitted to the legislature while it is in session, and shall become effective, and shall have the force of law, sixty days after submission, or at the close of the session, whichever is sooner, unless specifically modified or disapproved by a resolution concurred in by a majority of all the members.</p>
      <p>Section 5.07. <i>Executive Officers; Appointment.</i> The governor shall appoint and may remove the heads of all administrative departments. All others officers in the administrative service of the commonwealth shall be appointed and may be removed as provided by law.</p>
      <p>Section 5.08. <i>Succession to Governorship.</i><br>
      (a) If the governor-elect fails to assume office for any reason, the presiding officer of the legislature shall serve as acting governor until the governor-elect qualifies and assumes office or, if the governor-elect does not assume office within six months, until the unexpired term has been filled by special election and the newly elected governor has qualified. If, at the time the presiding officer of the legislature is to assume the acting governorship, the legislature has not yet organized and elected a presiding officer, the outgoing governor shall hold over until the presiding officer of the legislature is elected.<br>
      (b) When the governor is unable to discharge the duties of their office by reason of impeachment or other disability, including but not limited to physical or mental disability, or when the duties of the office are not being discharged by reason of their continuous absence, the presiding officer of the legislature shall serve as acting governor until the governor's disability or absence terminates. If the governor's disability or absence does not terminate within six months, the office of the governor shall be vacant.<br>
      (c) When, for any reason, a vacancy occurs in the office of the governor, the unexpired term shall be filled by special election except when such unexpired term is less than one year, in which event the presiding officer of the legislature shall succeed to the office for the remainder of the term. When a vacancy in the office of the governor is filled by special election, the presiding officer of the legislature shall serve as acting governor from the occurrence of the vacancy until the newly elected governor has qualified. When the presiding officer of the legislature succeeds to the office of governor, they shall have the title, powers, duties and emoluments of that office and, when they serve as acting governor, they shall have the powers and duties thereof and shall receive such compensation as the legislature shall provide by law.<br>
      (d) The legislature shall provide by law for special elections to fill vacancies in the office of the governor.<br>
      (e) The supreme court shall have original, exclusive and final jurisdiction to determine absence and disability of the governor or governor-elect and to determine the existence of a vacancy in the office of governor and all questions concerning succession to the office or to its powers and duties.</p>

      <p><b>ARTICLE VI</b></p>
      <p><b>The Judiciary</b></p>
      <p>Section 6.01. <i>Judicial Power.</i> The judicial power of the commonwealth shall be vested in a unified judicial system, which shall include a supreme court, an appellate court and a general court, and which shall also include such inferior courts of limited jurisdiction as may from time to time be established by law. All courts except the supreme court may be divided into geographical departments or districts as provided by law and into functional divisions and subdivisions as provided by law or by judicial rules not inconsistent with law.</p>
      <p>Section 6.02. <i>Supreme Court.</i> The supreme court shall be the highest court of the commonwealth and shall consist of a chief justice and six associate justices.</p>
      <p>Section 6.03. <i>Jurisdiction of Courts.</i> The supreme court shall have appellate jurisdiction in all cases arising under this constitution and the Constitution of the United States and in all other cases as provided by law. It shall also have original jurisdiction in cases arising under subsections 4.04(b) and 5.08(e) of this constitution and in all other cases as provided by law. All other courts of the commonwealth shall have original and appellate jurisdiction as provided by law, which jurisdiction shall be uniform in all geographical departments or districts of the same court. The jurisdiction of functional divisions and subdivisions shall be as provided by law or by judicial rules not inconsistent with law.</p>
      <p>Section 6.04. <i>Appointment of Judges; Qualifications; Tenure; Retirement; Removal.</i><br>
      (a) The governor, with the advice and consent of the legislature, shall appoint the chief justice and associate justices of the supreme court, and the judges of the appellate court. The governor shall give ten days' public notice before sending a judicial nomination to the legislature or before making an interim appointment when the legislature is not in session.<br>
      (b) No person shall be eligible for judicial office in the supreme court, appellate court and general court unless they have been admitted to practice law before the supreme court for at least five years. No person who holds judicial office in the supreme court, appellate court or general court shall hold any other paid office, position of profit or employment under the commonwealth, its civil divisions or the United States. Any justice of the supreme court, or judge of the appellate or general courts who becomes a candidate for an elective office shall thereby forfeit their judicial office.<br>
      (c) The justices of the supreme court shall be appointed to a term of fourteen years. The terms of each justice shall be staggered such that a new term begins on the first day of July in each odd-numbered year. They shall be retired upon attaining the age of seventy-five years and may be pensioned as may be provided by law. The chief justice of the supreme court may from time to time appoint retired judges to such special assignments as may be provided by the rules of the supreme court.<br>
      (d) The justices of the supreme court, and the judges of the appellate and general courts shall be subject to impeachment and any such judge impeached shall not exercise their office until acquitted. The supreme court may also remove judges of the appellate and general courts for such cause and in such manner as may be provided by law.<br>
      (e) The legislature shall provide by law for the appointment of judges of the inferior courts and for their qualifications, tenure, retirement and removal.<br>
      (f) The judges of the courts of this commonwealth shall receive such salaries as may be provided by law, which shall not be diminished during their term of office.</p>
      <p>Section 6.05. <i>Administration.</i> The chief justice of the supreme court shall be the administrative head of the unified judicial system. They may assign judges from one geographical department or functional division of a court to another department or division of that court and they may assign judges for temporary service from one court to another. The chief justice shall, with the approval of the supreme court, appoint an administrative director to serve at the pleasure of the chief justice and to supervise the administrative operation of the judicial system.</p>
      <p>Section 6.06. <i>Financing.</i> The chief justice shall submit an annual consolidated budget for the entire unified judicial system and the total cost of the system shall be paid by the commonwealth. The legislature may provide by law for the reimbursement to the commonwealth of appropriate portions of such cost by political subdivisions.</p>
      <p>Section 6.07. <i>Rule-making Power.</i> The supreme court shall make and promulgate rules governing the administration of all courts. It shall make and promulgate rules governing practice and procedure in civil and criminal cases in all courts. These rules may be changed by the legislature by a two thirds vote of all the members.</p>

      <p><b>ARTICLE VII</b></p>
      <p><b>Finance</b></p>
      <p>Section 7.01. <i>State Debt.</i> No debt shall be contracted by or in behalf of this commonwealth unless such debt shall be authorized by law for projects or objects distinctly specified therein.</p>
      <p>Section 7.02. <i>The Budget.</i> The governor shall submit to the legislature, at a time fixed by law, a budget estimate for the next fiscal year setting forth all proposed expenditures and anticipated income of all departments and agencies of the commonwealth, as well as a general appropriation bill to authorize the proposed expenditures and a bill or bills covering recommendations in the budget for new or additional revenues.</p>
      <p>Section 7.03. <i>Expenditure of Money.</i><br>
      (a) No money shall be withdrawn from the treasury except in accordance with appropriations made by law, nor shall any obligation for the payment of money be incurred except as authorized by law. The appropriation for each department, office or agency of the state, for which appropriation is made, shall be for a specific sum of money and no appropriation shall allocate to any object the proceeds of any particular tax or fund or a part or percentage thereof, except when required by the federal government for participation in federal programs.<br>
      (b) All state and local expenditures, including salaries paid by the legislative, executive and judicial branches of government, shall be matters of public record.</p>
