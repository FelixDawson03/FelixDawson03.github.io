<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>About — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
  <script src="/scripts/utils.js"></script>
</head>
<body>

<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>

<script>
  fetch('/includes/nav.html')
  .then(r => r.text())
  .then(html => {
    injectHTML(document.getElementById('nav-placeholder'), html);
    document.getElementById('rightCol').innerHTML = `
      <p><span class="PageHeading">About</span></p>
      <hr class="PageDivider">
      <p>Who am I? What is this? My name is Felix Dawson and welcome to my personal website! I have many different interests and hobbies, and I wanted somewhere that I could put them all in one place to share with my friends and the world—so here it is.</p>
      <p>About me: I live in Kentucky and have a degree in political science from the University of Kentucky. I'm on a journey to become a self-appointed expert in Kentucky politics, which is very much my niche in this world. I hope to eventually flesh out the Ky-pol section of this website with various explainers, resources, and what-have-you for the public about Kentucky politics and elections. I've also tasked myself with the never-ending task of cleaning up Wikipedia articles pertaining to Kentucky politics.</p>
      <p>If you would like to contact me about something on this site or anything else really, my email is linked on the right sidebar. Please do—I'm very bored.</p>
    `;
    return fetch('/includes/rightSidebar.html');
  })
  .then(r => r.text())
  .then(html => {
    document.getElementById('rightSidebar').innerHTML = html;
  });

fetch('/includes/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
