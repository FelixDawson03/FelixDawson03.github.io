<script>
fetch('/includes/bulletin.json')
  .then(r => r.json())
  .then(entries => {
    let showing = 5;
    const render = () => {
      const html = entries.slice(0, showing).map(e =>
        `<div style="padding-left:5.275em;text-indent:-5.275em;"><strong>${e.date}</strong> ${e.text} <a href="${e.url}">${e.article}</a></div>`
      ).join('');
      const showMore = showing < entries.length
        ? `<a href="#" id="bulletin-more">Show more</a>`
        : `<a href="#" id="bulletin-more" style="opacity:0.4;pointer-events:none;">Show more</a>`;
      const fullBulletin = `<a href="/wikipedia/bulletin/" id="bulletin-full">Full bulletin</a>`;
      document.getElementById('bulletin-container').innerHTML = html + `<div style="margin-top:6px;display:flex;gap:6px;">${showMore}${fullBulletin}</div>`;
      document.getElementById('bulletin-more')?.addEventListener('click', e => {
        e.preventDefault();
        if (showing < entries.length) {
          showing += 5;
          render();
        }
      });
    };
    render();
  });
</script>
