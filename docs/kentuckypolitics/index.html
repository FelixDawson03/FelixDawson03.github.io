<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Kentucky Politics — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
</head>
<body>
<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>
<script>
  fetch('/includes/nav.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('nav-placeholder').innerHTML = html;
      document.getElementById('rightCol').innerHTML = `
        <p><span class="PageHeading">Kentucky Politics</span></p>
        <hr class="PageDivider">
        <p>Brief description of this section.</p>

        <div class="PageSectionHeading">Data</div>
        <p>Download election data for Kentucky state and federal races, organized by year and election type.</p>
        <p><a href="/kentuckypolitics/data/">Election Data Downloads →</a></p>
      `;
      return fetch('/includes/rightSidebar.html');
    })
    .then(r => r.text())
    .then(html => {
      document.getElementById('rightSidebar').innerHTML = html;
    });

  fetch('/includes/footer.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
      document.getElementById('year').textContent = new Date().getFullYear();
    });
</script>
</body>
</html>
