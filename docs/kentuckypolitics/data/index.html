<body>
<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>
<script>
  fetch('/includes/nav.html')
    .then(r => r.text())
    .then(html => {
      injectHTML(document.getElementById('nav-placeholder'), html);
      document.getElementById('rightCol').innerHTML = `

        <div class="DataSection">
          <div class="DataYear">2024</div>
          <hr class="DataDivider">
          
          <div class="DataSubheading">General Election</div>
          <p>Data for President, Amendment 1, and Amendment 2. Note that three provisional ballots for Trump in Fayette County were not given precinct assignments, and are therefore absent from the state senate and state house totals.</p>
          <div class="DataRow">County data <span class="DataLinks">[<a href="/kentuckypolitics/data/2024_county.csv" download>Download CSV</a>]</span></div>
          <div class="DataRow">District-level data <span class="DataLinks">[<a href="/kentuckypolitics/data/2024_districts.csv" download>Download CSV</a>]</span></div>
          
          <div class="DataSubheading">Primary Election</div>
          <p>Data for the Republican and Democratic presidential primaries.</p>
          <div class="DataRow">County data <span class="DataLinks">[<a href="/kentuckypolitics/data/2024_primary_county.csv" download>Download CSV</a>]</span></div>
          <div class="DataRow">District-level data <span class="DataLinks">[<a href="/kentuckypolitics/data/2024_primary_districts.csv" download>Download CSV</a>]</span></div>
        </div>
        
        <div class="DataSection">
          <div class="DataYear">2023</div>
          <hr class="DataDivider">
          
          <div class="DataSubheading">General Election</div>
          <p>Data for Governor and all row offices. Note that absentee ballots in Laurel County were not given precinct assignments, and are therefore absent from the state house totals.</p>
          <div class="DataRow">County data <span class="DataLinks">[<a href="/kentuckypolitics/data/2023_county.csv" download>Download CSV</a>]</span></div>
          <div class="DataRow">District-level data <span class="DataLinks">[<a href="/kentuckypolitics/data/2023_districts.csv" download>Download CSV</a>]</span></div>

          <p>Data for Governor and all row offices. Note that absentee ballots in Laurel County were not given precinct assignments, and are therefore absent from the state house totals.</p>
          <div class="DataRow">County data <span class="DataLinks">[<a href="/kentuckypolitics/data/2023_primary_county.csv" download>Download CSV</a>]</span></div>
          <div class="DataRow">District-level data <span class="DataLinks">[<a href="/kentuckypolitics/data/2023_primary_districts.csv" download>Download CSV</a>]</span></div>
        </div>

        <div class="DataSection">
          <div class="DataYear">2022</div>
          <hr class="DataDivider">
          
          <div class="DataSubheading">General Election</div>

          <div class="DataRow">County data <span class="DataLinks">[<a href="/kentuckypolitics/data/2022_county.csv" download>Download CSV</a>]</span></div>

          <div class="DataSubheading">General Election</div>
          <p>Data for President, US Senate, Amendment 1, and Amendment 2.</p>

    .then(r => r.text())
