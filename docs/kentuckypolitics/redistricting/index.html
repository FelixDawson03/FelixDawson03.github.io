<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
  <title>Kentucky Redistricting Legislation — Felix Dawson</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="/styles/layout.css" />
  <link rel="stylesheet" type="text/css" href="/styles/styles.css" />
  <link rel="shortcut icon" href="/images/icon.png" />
  <script src="/scripts/utils.js"></script>
</head>
<body>
<div id="nav-placeholder"></div>
<div id="footer-placeholder"></div>
<script>
  fetch('/includes/nav.html')
    .then(r => r.text())
    .then(html => {
      injectHTML(document.getElementById('nav-placeholder'), html);
      return fetch('/includes/partyswitchers.json');
    })
    .then(r => r.json())
    .then(data => {
      const switchColor = s => s === 'D→R' ? '#ffcccc' : s === 'R→D' ? '#cce0ff' : s === 'R→I' ? '#ffffcc' : '#fff';
      let rows = '';
      data.forEach(group => {
        group.rows.forEach((r, i) => {
          const isFirst = i === 0;
          const hasShared = r.hasOwnProperty('houseSenateShared');
          rows += `<tr>
            ${isFirst ? `<td rowspan="${group.electionRowspan}">${group.elections}</td>` : ''}
            <td style="white-space:nowrap;">${r.year}</td>
            ${hasShared
              ? `<td colspan="2" style="text-align:center;white-space:nowrap;">${r.houseSenateShared}</td>`
              : `<td style="white-space:nowrap;">${r.house}</td><td style="white-space:nowrap;">${r.senate}</td>`
            }
            ${isFirst ? `<td rowspan="${group.electionRowspan}">${r.notes}</td>` : ''}
          </tr>`;
        });
      });
      document.getElementById('rightCol').innerHTML = `
        <div class="PageCornerLinkLeft"><a href="/kentuckypolitics/">← Kentucky Politics</a></div>
        <p><span class="PageHeading">Kentucky Redistricting Legislation</span></p>
        <p class="PageSubtitle">Published May 8, 2026</p>
        <hr class="PageDivider">
        <p>The following are members of the Kentucky General Assembly who switched parties in office or between terms in office. Legislators who switched parties before or after they held office are not included.</p>
        <div style="overflow-x:auto;">
          <table class="DataTable">
            <thead>
              <tr>
                <th>Elections</th>
                <th>Year of act</th>
                <th>House</th>
                <th>Senate</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
      document.getElementById('rightSidebar').style.display = 'none';
    });

  fetch('/includes/footer.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('footer-placeholder').innerHTML = html;
      document.getElementById('year').textContent = new Date().getFullYear();
    });
</script>
</body>
</html>
